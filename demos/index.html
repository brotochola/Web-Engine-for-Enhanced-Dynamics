<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Predators Demo - Multithreaded Game Engine</title>
  <style>
    #scene_list {
      position: fixed;
      top: 50vh;
      left: 50vw;
      transform: translate(-50%, -50%);
      color: white;
      z-index: 1000;
    }

    .scene_chooser_button {
      margin: 10px;
      width: 200px;
      height: 30px;
      background: #000;
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="scene_list"></div>
  <script type="module">
    // Import WeedJS engine 🌿
    import WEED from '/src/index.js';
    import { PredatorScene } from '/demos/scenes/PredatorScene.js';
    import { BallsScene } from '/demos/scenes/BallsScene.js';
    import { BallsAndRectanglesScene } from '/demos/scenes/BallsAndRectanglesScene.js';
    import { BichosScene } from '/demos/scenes/bichosScene.js';
    import { ConstraintsTestScene } from '/demos/scenes/constraints_test.js';
    import { CarScene } from '/demos/scenes/carScene.js';
    import { WaterAndBoxesScene } from '/demos/scenes/WaterAndBoxesScene.js';
    import { ZenithalParticleTestScene } from '/demos/scenes/zenithalParticleTestScene.js';
    import { AdobeAnimateScene } from '/demos/scenes/AdobeAnimateScene.js';
    import { PlatformerGameScene } from '/demos/scenes/PlatformerGameScene.js';
    // Destructure what we need from WEED
    const { GameEngine } = WEED;

    // ========================================
    // GAME ENGINE SETUP
    // ========================================

    const firebaseConfig = {
      apiKey: "AIzaSyA2PW7pAnTSrutVDYabtwL7Q3JB2Mir3Pw",
      authDomain: "webrtc-5c119.firebaseapp.com",
      databaseURL: "https://webrtc-5c119-default-rtdb.firebaseio.com",
      projectId: "webrtc-5c119",
      storageBucket: "webrtc-5c119.firebasestorage.app",
      messagingSenderId: "334466186648",
      appId: "1:334466186648:web:10429db094bf249c203fed",
    };

    const game = new GameEngine({
      autoResize: true,
      debug: true,
      network: {
        firebase: firebaseConfig,
        // iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      }
    });
    // Make game global for console access
    window.game = game;
    const scenes = [
      { name: '🐺 Predators', class: PredatorScene },
      { name: '⚽ Balls', class: BallsScene },
      { name: '🔗 Constraints', class: ConstraintsTestScene },
      { name: '📦 Boxes', class: BallsAndRectanglesScene },
      { name: '🐜 Ants', class: BichosScene },
      { name: '🚗 Car', class: CarScene },
      { name: '💧 Water & Boxes', class: WaterAndBoxesScene },
      { name: '🔬 Zenithal Particles', class: ZenithalParticleTestScene },
      { name: '🦴 Adobe Animate', class: AdobeAnimateScene },
      { name: 'platformer game', class: PlatformerGameScene },
    ]
    // Register available scenes with DebugUI for scene switching
    if (game.debugUI) {
      game.debugUI.registerScenes(scenes);
    }


    for (let i = 0; i < scenes.length; i++) {
      const scene = scenes[i];
      const button = document.createElement('button');
      button.className = 'scene_chooser_button';
      button.onclick = () => {
        game.loadScene(scene.class);
        document.getElementById('scene_list').style.display = 'none';
      }
      button.textContent = scene.name;
      document.getElementById('scene_list').appendChild(button);
      document.getElementById('scene_list').appendChild(document.createElement('br'));
    }


    // Load the Predator scene by default
    // await game.loadScene(PredatorScene);

  </script>
</body>
</html>
