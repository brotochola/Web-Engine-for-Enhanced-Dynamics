<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Integrated Worker Benchmark</title>
</head>
<body>
  <script type="module">
    class BenchmarkAudioContext {
      constructor() {
        this.state = 'running';
        this.destination = {};
        this.audioWorklet = {
          addModule: async () => {},
        };
      }

      resume() {
        this.state = 'running';
        return Promise.resolve();
      }
    }

    class BenchmarkAudioWorkletNode {
      constructor() {
        this.port = {
          postMessage() {},
        };
      }

      connect() {
        return this;
      }
    }

    globalThis.AudioContext = BenchmarkAudioContext;
    globalThis.AudioWorkletNode = BenchmarkAudioWorkletNode;

    /** Align with `demos/index.html` typical viewport when opened via the bench runner. */
    const DEFAULT_CANVAS_WIDTH = 1920;
    const DEFAULT_CANVAS_HEIGHT = 1080;

    /* Keep in sync with tests/bench/benchmarkDefaults.mjs */
    const DEFAULT_CONFIG = Object.freeze({
      warmupMs: 25000,
      durationMs: 18000,
      sampleIntervalMs: 100,
      canvasWidth: DEFAULT_CANVAS_WIDTH,
      canvasHeight: DEFAULT_CANVAS_HEIGHT,
      sceneModule: '/demos/scenes/BallsScene.js',
      sceneExport: 'BallsScene',
    });

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function normalizePositiveInteger(value, fallback) {
      const normalized = Number(value);
      return Number.isFinite(normalized) && normalized > 0 ? Math.round(normalized) : fallback;
    }

    function normalizeConfig(options = {}) {
      const canvasWidth = normalizePositiveInteger(options.canvasWidth, DEFAULT_CONFIG.canvasWidth);
      const canvasHeight = normalizePositiveInteger(options.canvasHeight, DEFAULT_CONFIG.canvasHeight);

      return {
        warmupMs: normalizePositiveInteger(options.warmupMs, DEFAULT_CONFIG.warmupMs),
        durationMs: normalizePositiveInteger(options.durationMs, DEFAULT_CONFIG.durationMs),
        sampleIntervalMs: normalizePositiveInteger(
          options.sampleIntervalMs,
          DEFAULT_CONFIG.sampleIntervalMs
        ),
        canvasWidth,
        canvasHeight,
        worldWidth: normalizePositiveInteger(options.worldWidth, canvasWidth),
        worldHeight: normalizePositiveInteger(options.worldHeight, canvasHeight),
        sceneModule: options.sceneModule || DEFAULT_CONFIG.sceneModule,
        sceneExport: options.sceneExport || DEFAULT_CONFIG.sceneExport,
      };
    }

    let currentGame = null;

    async function cleanupCurrentGame() {
      if (!currentGame) return;
      await currentGame.destroy();
      currentGame = null;
    }

    async function loadModules(sceneModule, sceneExport) {
      const [{ default: WEED }, sceneModuleExports, benchmarkMetrics] = await Promise.all([
        import('/src/index.js'),
        import(sceneModule),
        import('/tests/bench/workerBenchmarkMetrics.js'),
      ]);
      const SceneClass = sceneModuleExports[sceneExport];
      if (!SceneClass) {
        throw new Error(`Benchmark scene export "${sceneExport}" not found in ${sceneModule}`);
      }

      return {
        WEED,
        SceneClass,
        createWorkerBenchmarkReader: benchmarkMetrics.createWorkerBenchmarkReader,
        summarizeWorkerBenchmarkWindow: benchmarkMetrics.summarizeWorkerBenchmarkWindow,
      };
    }

    async function runIntegratedWorkerBenchmark(options = {}) {
      const config = normalizeConfig(options);
      const {
        WEED,
        SceneClass,
        createWorkerBenchmarkReader,
        summarizeWorkerBenchmarkWindow,
      } = await loadModules(config.sceneModule, config.sceneExport);

      await cleanupCurrentGame();

      const game = new WEED.GameEngine({
        autoResize: false,
        canvasWidth: config.canvasWidth,
        canvasHeight: config.canvasHeight,
        injectStyles: false,
        preventContextMenu: false,
        preventDefaultKeys: false,
        debug: false,
      });
      currentGame = game;

      await game.loadScene(SceneClass);
      const scene = game.currentScene;
      const reader = createWorkerBenchmarkReader(scene);

      await sleep(config.warmupMs);

      const startSnapshot = reader.snapshot(performance.now());
      const sampleSnapshots = [];
      const sampleDeadline = startSnapshot.takenAtMs + config.durationMs;

      while (performance.now() < sampleDeadline) {
        await sleep(Math.min(config.sampleIntervalMs, Math.max(0, sampleDeadline - performance.now())));
        sampleSnapshots.push(reader.snapshot(performance.now()));
      }

      const endSnapshot = reader.snapshot(performance.now());

      const summary = summarizeWorkerBenchmarkWindow(startSnapshot, endSnapshot, {
        measurementDurationMs: endSnapshot.takenAtMs - startSnapshot.takenAtMs,
        sampleSnapshots,
      });

      const result = {
        ...summary,
        metadata: {
          benchmark: 'integrated-worker-benchmark',
          sceneName: SceneClass.name || config.sceneExport,
          sceneModule: config.sceneModule,
          sceneExport: config.sceneExport,
          canvasWidth: config.canvasWidth,
          canvasHeight: config.canvasHeight,
          spatialWorkers: scene.config.spatial.numberOfSpatialWorkers,
          logicWorkers: scene.config.logic.numberOfLogicWorkers,
          worldWidth: config.worldWidth,
          worldHeight: config.worldHeight,
          warmupMs: config.warmupMs,
          durationMs: config.durationMs,
          sampleIntervalMs: config.sampleIntervalMs,
          sampleCount: sampleSnapshots.length,
        },
      };

      globalThis.__WEED_LAST_BENCHMARK__ = result;
      await cleanupCurrentGame();
      return result;
    }

    globalThis.__WEED_BENCHMARK__ = {
      run: runIntegratedWorkerBenchmark,
    };

    document.body.dataset.benchmarkReady = 'true';
  </script>
</body>
</html>
